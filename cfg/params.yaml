# pkg_path
# pkg_path: "/home/lin/ros_code/calibration_ws/src/lidar2cam_calibration"

# Topics
topic_img: "/usb_cam/image_raw"      # 原始图像（如果不需要去畸变）
topic_cloud: "/lidar_points_synced"

topic_img_new: "/aruco_image"
topic_cloud_seg: "/points_seg"
topic_cloud_filter: "/points_filter"

# frame_id
frame_id: "hesai_lidar"


# Dynamic rqt_reconfigure default bounds 点云的选取范围，用默认的就是，之后可以在线调
feature_extraction:
  x_min: 0.0
  x_max: 1.5
  y_min: -1
  y_max: 1
  z_min: -0.23
  z_max: 1.0

# Properties of chessboard calibration target  ,单位m
# ArUco marker是一个由二进制矩阵组成的正方形标记
ArucoID: 8               # Dictionary创建ArUco marker字典所需
marker_size: 0.12        # ArUco marker边长 单位m
min_detected_markers: 3  # 检测到ArUco marker最少3个，共4个

board_height: 0.50       # ArUco 标定板的高度 单位m
board_width: 0.70        # ArUco 标定板的宽度 单位m

delta_width_qr_center: 0.58   # 左右两列ArUco marker中心距 单位m
delta_height_qr_center: 0.38  # 上下两行ArUco marker中心距 单位m

# Camera internal reference 相机内参,畸变
fx: 685.990560
fy: 685.291790
cx: 917.032444
cy: 497.956248

k1: 0.006154
k2: -0.021981
k3: 0.000000
p1: -0.001910
p2: 0.001129

# optimization_mode优化方式,相机内参是否参数,默认0只优化T,1为同时优化K,T
optimization_mode: 0
